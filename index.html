<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fafaf9">
  <title>iPAS AI 中級 - 智慧刷題</title>
  <script>
    // Apply theme before paint to avoid FOUC
    (function() {
      var stored = localStorage.getItem('theme');
      var theme = stored || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <header>
    <h1>iPAS AI 中級</h1>
    <div class="header-right">
      <div id="countdown" class="countdown"></div>
      <button id="theme-toggle" class="theme-toggle" aria-label="切換亮暗模式" title="切換亮暗模式">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="app"></main>

  <nav id="bottom-nav">
    <button data-screen="learn" class="active">學習</button>
    <button data-screen="practice">練習</button>
    <button data-screen="stats">進度</button>
  </nav>

  <script src="js/questions-s1.js"></script>
  <script src="js/questions-s2.js"></script>
  <script src="js/questions-s3.js"></script>
  <script src="js/authored.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/concepts.js"></script>
  <script src="js/state.js"></script>
  <script src="js/scheduler.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
